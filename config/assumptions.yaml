# config/assumptions.yaml
# ALL scenario + risk parameters live here. Every value carries a source.
# The sim (backend/app/sim/flow_model.py) and the risk model
# (backend/app/agents/risk_scoring.py) read exclusively from this file — no
# magic numbers in code. This is the transparency contract for the judges.

macro:
  india_crude_demand_kbd: 5300
  # source: PPAC — India crude processing ~5.2-5.4 mb/d (FY24). Midpoint.
  import_dependence_pct: 88
  # source: ET Hackathon brief PS2 (88% import dependence).
  domestic_production_kbd: 590
  # source: PPAC — ONGC/OIL/private ~0.58-0.60 mb/d.
  hormuz_share_pct: 43
  # source: brief PS2 (40-45% of imports via Hormuz). Midpoint.

spr:
  # Strategic + commercial cover expressed in days of net imports.
  strategic_cover_days: 9.5
  # source: brief PS2 (~9.5 days of strategic reserve cover).
  commercial_cover_days: 55
  # source: IEA/industry — India total (incl. commercial) ~ 65-77 days; the
  #   strategic tranche is the ~9.5 days above. Commercial used for runway math.
  total_reserve_kb: 0
  # 0 => computed at load time as (strategic+commercial) days * net_imports.

prices:
  brent_baseline_usd: 82.0
  # source: fallback baseline; overridden by cached yfinance BZ=F at seed time.
  # Spot premium applied per scenario when a corridor is disrupted ($/bbl).
  spot_premium_curve:
    # supply_gap_pct_of_imports -> spot premium $/bbl (piecewise linear).
    - { gap_pct: 0.0,  premium_usd: 0.0 }
    - { gap_pct: 5.0,  premium_usd: 4.0 }
    - { gap_pct: 10.0, premium_usd: 9.0 }
    - { gap_pct: 20.0, premium_usd: 22.0 }
    - { gap_pct: 40.0, premium_usd: 55.0 }
    # source: indicative elasticity from 2019 Abqaiq / 2022 shocks; illustrative.

freight:
  # Rerouting freight cost adders in $/bbl vs the baseline corridor for that
  # barrel. Used when procurement reroutes around a disrupted chokepoint.
  reroute_adder_usd:
    hormuz_to_cape: 3.2       # Gulf barrels sent long-haul when buyers avoid Gulf
    red_sea_to_cape: 4.5      # Suez -> Cape of Good Hope diversion
    baseline: 0.0
  # source: Worldscale-derived approximations for VLCC diversions; indicative.

pass_through:
  # Retail price pass-through of a landed-cost delta, INR/litre.
  usd_per_bbl_to_inr_per_litre: 0.52
  # source: derivation — 1 $/bbl over 159 L at ~83 INR/USD = ~0.52 INR/L of
  #   crude cost; refining+tax dampening folded into the coefficient below.
  pass_through_efficiency: 0.35
  # source: assumption — only ~35% of a crude-cost delta reaches the pump
  #   short-run (excise buffering, marketing-margin absorption). Testable.
  usd_inr: 83.0
  # source: indicative FX.

procurement:
  # Freight proxy: extra $/bbl per laden transit-day beyond the Hormuz baseline.
  freight_per_transit_day_usd: 0.15
  # source: indicative VLCC economics (Worldscale-derived); illustrative.
  reference_transit_days: 6
  # source: Hormuz baseline laden transit to west-coast India (corridors.yaml).
  max_liftable_kbd: 300
  # source: assumption — plausible incremental spot liftability per grade/month.
  # Ranking weights (higher rank_score = better recommendation).
  rank_weights:
    compat_refineries: 10.0
    availability: 10.0
    cost_delta: 1.0        # penalty per $/bbl
    transit_days: 0.1      # penalty per day
  # SIMULATED spot availability index per crude (0..1). Labelled in the UI.
  availability_index:
    murban: 0.80
    upper_zakum: 0.70
    wti_midland: 0.75
    mars: 0.65
    bonny_light: 0.72
    forcados: 0.60
    girassol: 0.58
    tupi: 0.62
    cpc_blend: 0.45
    es_sider: 0.40
    urals: 0.85
    default: 0.55

risk_model:
  # Deterministic corridor risk: exponential time-decayed sum of
  # severity * type_weight, squashed to 0-100. See agents/risk_scoring.py.
  decay_half_life_hours: 36
  # source: assumption — a headline's influence halves every 36h.
  squash_scale: 4.0
  # logistic scale: score = 100 / (1 + exp(-(weighted_sum - midpoint)/scale))
  squash_midpoint: 3.0
  baseline_floor:
    # Structural baseline risk per corridor before any events (0-100).
    hormuz: 45          # source: brief PS2 framing — Hormuz structurally tense.
    red_sea: 40         # source: post-2024 Houthi disruption baseline.
    cape: 15
    atlantic_usgulf: 10
    pacific_fareast: 12
  type_weights:
    # Event type -> weight applied to LLM-scored severity (0-1).
    military_strike: 1.6
    naval_incident: 1.3
    sanction: 1.1
    blockade_threat: 1.5
    port_closure: 1.4
    diplomatic_escalation: 0.9
    opec_action: 0.8
    price_spike: 0.6
    other: 0.4
  auto_trigger_threshold: 70
  # source: assumption — score >= 70 auto-runs the corridor's mapped scenario.
