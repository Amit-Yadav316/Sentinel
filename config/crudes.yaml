# config/crudes.yaml
# Crude assays used to score grade compatibility and cost. api = API gravity
# (deg), sulfur_pct = wt% sulfur, fob_diff_usd = typical FOB differential to
# dated Brent ($/bbl; negative = discount). corridor = primary import corridor.
#
# source: public assay libraries (BP, ExxonMobil, Chevron crude assays) for
#   API/sulfur; FOB differentials are indicative recent-cycle levels, not live
#   quotes. Urals discount + sanction caveat per public reporting.

crudes:
  - id: basrah_medium
    name: Basrah Medium
    origin: Iraq
    api: 28.5
    sulfur_pct: 2.9
    fob_diff_usd: -3.5
    load_port: Basra
    corridor: hormuz

